version: '3.8'

services:
  telegram-bot:
    build: .
    container_name: subtitle-bot
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - MAX_FILE_SIZE=2147483648
      - TEMP_DIR=/app/temp
      - FFMPEG_THREADS=4
      - ENCODING_PRESET=ultrafast
    volumes:
      - ./temp:/app/temp
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 6G
        reservations:
          cpus: '2'
          memory: 2G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

version: '3.8'

services:
  bot:
    build: .
    container_name: hardsub-bot
    environment:
      - PORT=8000
    volumes:
      - ./temp:/app/temp
      - ./output:/app/output
      - ./sessions:/app/sessions
    ports:
      - "8000:8000"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G

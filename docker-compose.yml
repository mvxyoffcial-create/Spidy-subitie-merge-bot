version: '3.8'

services:
  telegram-bot:
    build: .
    container_name: subtitle-bot
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - API_ID=${API_ID}
      - API_HASH=${API_HASH}
      - MAX_FILE_SIZE=2147483648
      - TEMP_DIR=/app/temp
      - FFMPEG_THREADS=4
      - ENCODING_PRESET=ultrafast
      - BOT_SESSION=subtitle_bot
    volumes:
      - ./temp:/app/temp
      - ./sessions:/app/sessions
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 6G
        reservations:
          cpus: '2'
          memory: 2G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    network_mode: bridge
